services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    labels:
      - autoheal=true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  odoo:
    image: odoo:18
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER}
      PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${ODOO_PORT}:8069"
      - "${ODOO_LONGPOLLING_PORT}:8072"
    volumes:
      - ./config:/etc/odoo:ro
      - ./addons:/mnt/extra-addons:ro
      - odoo-data:/var/lib/odoo
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    labels:
      - autoheal=true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # Watchdog: restarts any container labelled autoheal=true that Docker
  # reports as "unhealthy" (handles hung-but-not-crashed processes that
  # restart:unless-stopped alone won't catch). Needs read access to the
  # Docker socket — see the security note in README / deployment docs.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30        # check every 30s
      AUTOHEAL_START_PERIOD: 120   # grace period before first check
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }

volumes:
  pgdata:
  odoo-data:
