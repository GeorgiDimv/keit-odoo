[options]
; addons_path is a flat list of dirs; each dir's children are modules.
; OCA layout puts modules one level deeper (per-repo subdirs), so we list
; every repo dir explicitly. Keep this list in sync with setup-oca.sh REPOS.
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/extra-addons/account-financial-reporting,/mnt/extra-addons/account-financial-tools,/mnt/extra-addons/account-payment,/mnt/extra-addons/account-reconcile,/mnt/extra-addons/bank-payment,/mnt/extra-addons/bank-statement-import,/mnt/extra-addons/l10n-bulgaria,/mnt/extra-addons/purchase-workflow,/mnt/extra-addons/queue,/mnt/extra-addons/reporting-engine,/mnt/extra-addons/sale-workflow,/mnt/extra-addons/server-tools,/mnt/extra-addons/server-ux,/mnt/extra-addons/stock-logistics-reporting,/mnt/extra-addons/stock-logistics-warehouse,/mnt/extra-addons/web
data_dir = /var/lib/odoo

; The odoo:18 entrypoint translates HOST/USER/PASSWORD env to CLI flags for
; the main process, but `docker compose exec ... odoo ...` (e.g. make update)
; bypasses the entrypoint, so we need defaults here. CLI flags / env always
; win over conf-file values, so this stays safe under .env changes.
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

admin_passwd = admin
list_db = True
proxy_mode = False

workers = 2
max_cron_threads = 1
limit_time_cpu = 600
limit_time_real = 1200
limit_memory_soft = 671088640
limit_memory_hard = 805306368

log_level = info
log_handler = :INFO,werkzeug:WARNING,odoo.modules.loading:INFO,odoo.modules.module:INFO
